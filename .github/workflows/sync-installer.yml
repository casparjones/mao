name: Sync scripts → docs/

# Keep docs/ (served by GitHub Pages) in lockstep with the repo-root scripts.
# Triggered only on changes to the relevant files, so the auto-commit
# does not re-trigger the workflow.

on:
  push:
    branches: [main]
    paths:
      - 'install.sh'
      - 'uninstall.sh'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy scripts into docs/
        run: |
          mkdir -p docs
          cp install.sh   docs/install.sh
          cp uninstall.sh docs/uninstall.sh

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/install.sh docs/uninstall.sh
          if git diff --staged --quiet; then
            echo "docs/ already up to date"
            exit 0
          fi
          git commit -m "chore: sync install.sh + uninstall.sh → docs/"
          git push
